<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор премий</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="//api.bitrix24.com/api/v1/"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        body {
            background: linear-gradient(135deg, #fdf2f8 0%, #ede9fe 50%, #dbeafe 100%);
            min-height: 100vh;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .transition-width { transition: width 0.3s ease-in-out; }
        .deal-item:hover { background: linear-gradient(135deg, #fce7f3, #ede9fe); }
        .deal-item.selected { background: linear-gradient(135deg, #fbcfe8, #ddd6fe); border-color: #a855f7; }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .gradient-border {
            position: relative;
        }
        .gradient-border::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, #c084fc, #f472b6, #38bdf8);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }
        .float-anim {
            animation: float 3s ease-in-out infinite;
        }
        input, select {
            transition: all 0.2s ease;
        }
        input:focus, select:focus {
            transform: scale(1.01);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const ALLOWED_USER_IDS = [1, 48, 12, 400, 420, 450, 28];

        const COMPANIES = {
            security: { name: 'Секьюрити', vat: 0.22, tax: 0.25 },
            systems: { name: 'Системс', vat: 0.05, tax: 0.15 }
        };

        const SALE_TYPES = [
            { id: 'isa', name: 'Продажа ISA', rate: 0.10 },
            { id: 'license_no_tp', name: 'Лицензия без ТП', rate: 0.05 },
            { id: 'license_tp', name: 'Лицензия с ТП', rate: 0.07 },
            { id: 'service', name: 'Услуги / Внедрение', rate: 0.15 },
            { id: 'license_service', name: 'Продажа лицензии с услугами', rate: 0.12 },
            { id: 'full_margin', name: 'Чистая маржа (100%)', rate: 1.0 },
        ];

        const WHAT_SOLD_MAP = {
            '216': { type: 'license_no_tp', desc: 'Только лицензии' },
            '218': { type: 'service', desc: 'Только тех. поддержку' },
            '220': { type: 'service', desc: 'Только проект' },
            '222': { type: 'license_tp', desc: 'Лицензии и тех. поддержку' },
            '224': { type: 'license_service', desc: 'Лицензии и проект' },
            '226': { type: 'service', desc: 'Проект и тех. поддержку' },
            '252': { type: 'license_service', desc: 'Проект, лицензия, тех.поддержка' },
        };

        const COMPANY_MAP = {
            '1328': { key: 'systems', name: 'Puzzle Systems' },
            '1330': { key: 'security', name: 'Puzzle Security' },
        };

        const formatCurrency = (v) => new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB', maximumFractionDigits: 0 }).format(v);
        const formatPercent = (v) => new Intl.NumberFormat('ru-RU', { style: 'percent', maximumFractionDigits: 1 }).format(v);

        function parseNumber(str) {
            if (typeof str === 'number') return str;
            if (!str) return 0;
            const s = String(str).replace(/\s/g, '').replace(',', '.');
            const n = parseFloat(s);
            return isNaN(n) ? 0 : n;
        }

        function bxCall(method, params = {}) {
            return new Promise((resolve, reject) => {
                if (typeof BX24 !== 'undefined' && BX24.callMethod) {
                    BX24.callMethod(method, params, (res) => {
                        if (res.error()) reject(new Error(res.error().toString()));
                        else resolve(res.data());
                    });
                } else {
                    reject(new Error('BX24 not available'));
                }
            });
        }

        function parseAmount(val) {
            if (!val) return 0;
            if (typeof val === 'number') return val;
            const str = String(val);
            const m = str.match(/^([\d,.]+)/);
            if (m) return parseFloat(m[1].replace(',', '.')) || 0;
            return parseFloat(str) || 0;
        }

        const AccessDenied = ({ userId }) => (
            <div className="min-h-screen flex items-center justify-center p-4" style={{background: 'linear-gradient(135deg, #fdf2f8 0%, #ede9fe 50%, #dbeafe 100%)'}}>
                <div className="max-w-md w-full glass-card rounded-2xl shadow-xl shadow-purple-200/50 p-8 text-center">
                    <div className="w-16 h-16 bg-gradient-to-br from-red-400 to-pink-400 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-red-200/50">
                        <span className="material-symbols-outlined text-white text-3xl">lock</span>
                    </div>
                    <h1 className="text-2xl font-bold bg-gradient-to-r from-purple-600 to-pink-500 bg-clip-text text-transparent mb-2">Доступ запрещён</h1>
                    <p className="text-slate-600 mb-4">У вас нет прав для доступа к этому приложению.</p>
                    <div className="text-sm text-slate-700 mb-4 p-3 bg-white/60 backdrop-blur rounded-xl border border-white/50">
                        Ваш ID: <span className="font-bold bg-gradient-to-r from-purple-600 to-pink-500 bg-clip-text text-transparent">{userId || 'не определён'}</span>
                    </div>
                    <div className="text-sm text-slate-500 mb-4">Обратитесь к администратору для получения доступа.</div>
                    <div className="text-xs text-slate-400 border-t border-white/50 pt-4 mt-4">
                        Разрешены пользователи с ID: {ALLOWED_USER_IDS.join(', ')}
                    </div>
                </div>
            </div>
        );

        const App = () => {
            const [loading, setLoading] = useState(true);
            const [currentUser, setCurrentUser] = useState(null);
            const [deals, setDeals] = useState([]);
            const [dealsLoading, setDealsLoading] = useState(false);
            const [dealsError, setDealsError] = useState('');
            const [dealSearch, setDealSearch] = useState('');
            const [selectedDealId, setSelectedDealId] = useState(null);
            const [isBxMode, setIsBxMode] = useState(false);

            const [companyKey, setCompanyKey] = useState('security');
            const [projectCost, setProjectCost] = useState('');
            const [licenseCost, setLicenseCost] = useState('');
            const [vatableAmount, setVatableAmount] = useState('');
            const [saleTypeId, setSaleTypeId] = useState('isa');
            const [employees, setEmployees] = useState([
                { id: 1, name: 'Менеджер проекта', share: 0.4 },
                { id: 2, name: 'Сейлз-менеджер', share: 0.3 },
                { id: 3, name: 'Технический специалист', share: 0.2 },
            ]);
            const [showDealPanel, setShowDealPanel] = useState(false);

            useEffect(() => {
                if (typeof BX24 !== 'undefined') {
                    setIsBxMode(true);
                    BX24.init(() => {
                        BX24.callMethod('user.current', {}, (res) => {
                            if (!res.error()) setCurrentUser(res.data());
                            setLoading(false);
                        });
                    });
                } else {
                    setCurrentUser({ ID: 1, NAME: 'Локальный Тест', LAST_NAME: '' });
                    setLoading(false);
                }
            }, []);

            useEffect(() => {
                if (!loading && isBxMode) fetchBxDeals();
            }, [loading]);

            async function fetchBxDeals() {
                setDealsLoading(true);
                setDealsError('');
                try {
                    let all = [];
                    let start = 0;
                    const limit = 50;
                    let hasMore = true;

                    while (hasMore) {
                        const items = await bxCall('crm.deal.list', {
                            filter: { STAGE_SEMANTIC_ID: 'S' },
                            select: [
                                'ID', 'TITLE', 'STAGE_ID', 'OPPORTUNITY', 'CURRENCY_ID',
                                'ASSIGNED_BY_ID', 'CLOSEDATE',
                                'UF_CRM_1779105218860', 'UF_CRM_1730631476', 'UF_CRM_1746605916',
                                'UF_CRM_1730850080', 'UF_CRM_1730850094', 'UF_CRM_1730850105',
                                'UF_CRM_1761864568472', 'UF_CRM_1730629204',
                                'UF_CRM_1730629663', 'UF_CRM_1730629684'
                            ],
                            order: { CLOSEDATE: 'DESC' },
                            start,
                            limit
                        });
                        if (!Array.isArray(items)) break;
                        all = all.concat(items);
                        hasMore = items.length === limit;
                        start += limit;
                    }
                    setDeals(normalizeDeals(all));
                } catch (e) {
                    setDealsError(e.message);
                }
                setDealsLoading(false);
            }

            function normalizeDeals(raw) {
                return raw.map(d => ({
                    id: d.ID,
                    title: d.TITLE || '',
                    stageId: d.STAGE_ID || '',
                    amount: parseAmount(d.OPPORTUNITY),
                    currency: d.CURRENCY_ID || 'RUB',
                    assignedById: d.ASSIGNED_BY_ID || '',
                    closedAt: d.CLOSEDATE || '',
                    companyField: d.UF_CRM_1779105218860 || '',
                    dealType: d.UF_CRM_1730631476 || '',
                    whatSold: d.UF_CRM_1746605916 || '',
                    licenseCost: parseAmount(d.UF_CRM_1730850080),
                    supportCost: parseAmount(d.UF_CRM_1730850094),
                    workCost: parseAmount(d.UF_CRM_1730850105),
                    totalAmount: parseAmount(d.UF_CRM_1761864568472),
                    product: d.UF_CRM_1730629204 || '',
                    financialResult: parseAmount(d.UF_CRM_1730629663),
                    margin: parseAmount(d.UF_CRM_1730629684)
                }));
            }

            function selectDeal(deal) {
                setSelectedDealId(deal.id);
                const what = WHAT_SOLD_MAP[deal.whatSold];
                if (what) setSaleTypeId(what.type);
                const comp = COMPANY_MAP[deal.companyField];
                if (comp) setCompanyKey(comp.key);
                const total = deal.totalAmount || deal.amount || 0;
                if (total > 0) setProjectCost(String(total));
                const lic = deal.licenseCost || 0;
                const sup = deal.supportCost || 0;
                const wrk = deal.workCost || 0;
                const totalLic = lic + sup;
                if (totalLic > 0) setLicenseCost(String(totalLic));
                else if (lic > 0) setLicenseCost(String(lic));
                const vatPart = sup + wrk;
                if (vatPart > 0) setVatableAmount(String(vatPart));
            }

            const filteredDeals = deals.filter(d =>
                !dealSearch || d.title.toLowerCase().includes(dealSearch.toLowerCase())
            );
            const selectedDeal = deals.find(d => d.id === selectedDealId);
            const pc = parseNumber(projectCost);
            const lc = parseNumber(licenseCost);
            const va = parseNumber(vatableAmount);

            const calculation = useMemo(() => {
                const company = COMPANIES[companyKey];
                const saleType = SALE_TYPES.find(t => t.id === saleTypeId) || SALE_TYPES[0];
                let costNoVat, calculatedVatAmount = 0, displayMargin = 0, marginExclVat = 0;

                if (saleType.id === 'license_no_tp') {
                    costNoVat = pc;
                    displayMargin = pc - lc;
                    marginExclVat = displayMargin;
                } else if (saleType.id === 'license_tp' || saleType.id === 'license_service') {
                    const vatFromPart = va - (va / (1 + company.vat));
                    calculatedVatAmount = vatFromPart;
                    costNoVat = pc - calculatedVatAmount;
                    displayMargin = pc - lc - va;
                    marginExclVat = displayMargin;
                } else {
                    costNoVat = pc / (1 + company.vat);
                    calculatedVatAmount = pc - costNoVat;
                    displayMargin = pc - lc;
                    marginExclVat = costNoVat - lc;
                }

                const netMargin = marginExclVat * (1 - (company.tax + 0.35));
                const fot = netMargin > 0 ? netMargin * saleType.rate : 0;
                return { company, saleType, costNoVat, calculatedVatAmount, displayMargin, netMargin, fot };
            }, [companyKey, pc, lc, saleTypeId, va]);

            const totalShare = employees.reduce((s, e) => s + e.share, 0);
            const isShareValid = totalShare <= 1.0001;
            const updateEmployeeShare = (id, ns) => setEmployees(prev => prev.map(e => e.id === id ? { ...e, share: Math.min(Math.max(ns, 0), 1) } : e));
            const updateEmployeeName = (id, nn) => setEmployees(prev => prev.map(e => e.id === id ? { ...e, name: nn } : e));
            const addEmployee = () => setEmployees([...employees, { id: Math.max(...employees.map(e => e.id), 0) + 1, name: 'Новый сотрудник', share: 0 }]);
            const removeEmployee = (id) => setEmployees(employees.filter(e => e.id !== id));

            if (loading) {
                return (
                    <div className="flex h-screen items-center justify-center" style={{background: 'linear-gradient(135deg, #fdf2f8 0%, #ede9fe 50%, #dbeafe 100%)'}}>
                        <div className="flex flex-col items-center gap-3">
                            <span className="material-symbols-outlined animate-spin text-5xl bg-gradient-to-br from-purple-500 via-pink-500 to-sky-400 bg-clip-text text-transparent">progress_activity</span>
                            <span className="text-sm text-slate-500">Загрузка...</span>
                        </div>
                    </div>
                );
            }

            const currentUserId = currentUser ? parseInt(currentUser.ID, 10) : 0;
            const hasAccess = ALLOWED_USER_IDS.includes(currentUserId);
            const userName = currentUser ? `${currentUser.NAME} ${currentUser.LAST_NAME || ''}`.trim() : 'Гость';

            if (!hasAccess) return <AccessDenied userId={currentUserId} />;

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-6 font-sans text-slate-800">
                    <header className="glass-card rounded-2xl p-5 mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4 shadow-lg shadow-purple-200/50">
                        <div className="flex items-center gap-4">
                            <div className="bg-gradient-to-br from-purple-500 via-pink-500 to-sky-400 text-white p-3 rounded-2xl shadow-lg shadow-purple-300/50 float-anim">
                                <span className="material-symbols-outlined block text-2xl">calculate</span>
                            </div>
                            <div>
                                <h1 className="text-2xl font-bold bg-gradient-to-r from-purple-600 via-pink-500 to-sky-400 bg-clip-text text-transparent">Калькулятор премий</h1>
                                <p className="text-sm text-slate-500">Расчёт маржинальности и распределение бонусов</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="text-xs text-slate-500 bg-white/80 backdrop-blur px-3 py-1.5 rounded-full shadow-sm">
                                {currentUserId ? `ID: ${currentUserId} | ${isBxMode ? 'Портал' : 'Локально'}` : ''}
                            </div>
                            <button onClick={() => setShowDealPanel(!showDealPanel)}
                                className="flex items-center gap-2 bg-gradient-to-r from-purple-500 via-pink-500 to-sky-400 text-white px-4 py-2.5 rounded-xl hover:opacity-90 transition-all text-sm font-medium shadow-md shadow-purple-300/40 hover:shadow-lg hover:shadow-purple-300/60 active:scale-95">
                                <span className="material-symbols-outlined text-sm">assignment</span>
                                {showDealPanel ? 'Скрыть сделки' : 'Загрузить из сделки'}
                            </button>
                        </div>
                    </header>

                    {!isBxMode && (
                        <div className="mb-4 bg-gradient-to-r from-amber-50 to-orange-50 border border-amber-200/60 rounded-2xl p-4 text-sm text-amber-700 flex items-center gap-2 shadow-sm">
                            <span className="material-symbols-outlined text-amber-500 text-lg">info</span>
                            Режим локальной разработки. Загрузка сделок доступна только при работе внутри портала Bitrix24.
                        </div>
                    )}

                    {showDealPanel && (
                        <div className="mb-6 glass-card rounded-2xl shadow-xl shadow-purple-200/40 overflow-hidden">
                            <div className="bg-gradient-to-r from-purple-50 via-pink-50 to-sky-50 px-5 py-3.5 border-b border-white/50 flex items-center justify-between">
                                <h3 className="font-semibold text-slate-700 flex items-center gap-2">
                                    <span className="material-symbols-outlined bg-gradient-to-br from-purple-500 to-pink-500 bg-clip-text text-transparent text-lg">assignment</span>
                                    Сделки из CRM ({deals.length})
                                </h3>
                                <button onClick={fetchBxDeals} disabled={dealsLoading || !isBxMode}
                                    className="text-purple-600 hover:text-purple-800 text-sm flex items-center gap-1 font-medium">
                                    <span className="material-symbols-outlined text-sm">refresh</span>
                                    Обновить
                                </button>
                            </div>
                            <div className="p-4">
                                <input type="text" value={dealSearch} onChange={e => setDealSearch(e.target.value)}
                                    placeholder="Поиск сделок по названию..."
                                    className="w-full rounded-xl border border-purple-200/60 bg-white/60 p-2.5 mb-3 focus:ring-2 focus:ring-purple-300 focus:border-purple-400 outline-none backdrop-blur" />
                                {dealsLoading && <div className="text-center text-slate-500 py-4">Загрузка сделок...</div>}
                                {dealsError && <div className="text-center text-red-500 py-4">Ошибка: {dealsError}</div>}
                                {!dealsLoading && !dealsError && (
                                    <div className="max-h-64 overflow-y-auto space-y-1 pr-1">
                                        {filteredDeals.length === 0 && (
                                            <div className="text-center text-slate-400 py-4">
                                                {deals.length === 0 ? 'Сделки не загружены. Нажмите "Обновить".' : 'Сделки не найдены'}
                                            </div>
                                        )}
                                        {filteredDeals.map(deal => (
                                            <div key={deal.id}
                                                onClick={() => { selectDeal(deal); setShowDealPanel(false); }}
                                                className={`deal-item flex items-center justify-between p-3 rounded-xl border cursor-pointer transition-all
                                                    ${selectedDealId === deal.id ? 'selected' : 'border-transparent hover:border-purple-300 bg-white/40 hover:bg-white/70'}`}>
                                                <div className="flex-1 min-w-0">
                                                    <div className="font-medium text-sm truncate">{deal.title}</div>
                                                    <div className="text-xs text-slate-400">
                                                        {deal.totalAmount > 0 ? formatCurrency(deal.totalAmount) : ''}
                                                        {deal.totalAmount > 0 && deal.closedAt ? ' | ' : ''}
                                                        {deal.closedAt ? new Date(deal.closedAt).toLocaleDateString('ru-RU') : ''}
                                                        {deal.product ? ` | ${deal.product}` : ''}
                                                    </div>
                                                </div>
                                                <div className="text-xs text-slate-500 ml-2">#{deal.id}</div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        <div className="lg:col-span-7 space-y-6">
                            {selectedDeal && (
                                <div className="bg-gradient-to-r from-purple-50 via-pink-50 to-sky-50 rounded-2xl border border-purple-200/40 p-4 shadow-sm">
                                    <div className="flex items-center justify-between mb-2">
                                        <h3 className="font-semibold text-purple-800 text-sm flex items-center gap-1">
                                            <span className="material-symbols-outlined text-sm bg-gradient-to-br from-purple-500 to-pink-500 bg-clip-text text-transparent">check_circle</span>
                                            Данные из сделки #{selectedDeal.id}
                                        </h3>
                                        <button onClick={() => setSelectedDealId(null)}
                                            className="text-xs text-purple-500 hover:text-purple-700 font-medium">Очистить</button>
                                    </div>
                                    <div className="text-xs text-purple-700 space-y-1">
                                        <div><strong>{selectedDeal.title}</strong></div>
                                        {selectedDeal.product && <div>Продукт: {selectedDeal.product}</div>}
                                        <div className="flex flex-wrap gap-x-4 gap-y-1">
                                            {selectedDeal.totalAmount > 0 && <span>Сумма: {formatCurrency(selectedDeal.totalAmount)}</span>}
                                            {selectedDeal.licenseCost > 0 && <span>Лицензии: {formatCurrency(selectedDeal.licenseCost)}</span>}
                                            {selectedDeal.supportCost > 0 && <span>ТП: {formatCurrency(selectedDeal.supportCost)}</span>}
                                            {selectedDeal.workCost > 0 && <span>Работы: {formatCurrency(selectedDeal.workCost)}</span>}
                                            {selectedDeal.margin > 0 && <span>Маржа: {formatCurrency(selectedDeal.margin)}</span>}
                                        </div>
                                        {WHAT_SOLD_MAP[selectedDeal.whatSold] && (
                                            <div className="text-purple-500">Тип: {WHAT_SOLD_MAP[selectedDeal.whatSold].desc}</div>
                                        )}
                                    </div>
                                </div>
                            )}

                            <div className="glass-card rounded-2xl shadow-xl shadow-purple-200/40 p-5">
                                <h2 className="text-lg font-semibold mb-4 flex items-center gap-2">
                                    <span className="material-symbols-outlined bg-gradient-to-br from-purple-500 via-pink-500 to-sky-400 bg-clip-text text-transparent">dataset</span>
                                    Параметры проекта
                                </h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="col-span-2 md:col-span-1">
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Компания</label>
                                        <select value={companyKey} onChange={e => setCompanyKey(e.target.value)}
                                            className="w-full rounded-xl border-purple-200/60 border p-2.5 bg-white/60 backdrop-blur focus:bg-white focus:ring-2 focus:ring-purple-300 focus:border-purple-400 outline-none transition">
                                            {Object.entries(COMPANIES).map(([k, d]) => (
                                                <option key={k} value={k}>{d.name}</option>
                                            ))}
                                        </select>
                                        <div className="text-xs text-slate-500 mt-1">
                                            НДС: {formatPercent(COMPANIES[companyKey].vat)}, Налог: {formatPercent(COMPANIES[companyKey].tax)}
                                        </div>
                                    </div>
                                    <div className="col-span-2 md:col-span-1">
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Вид продажи</label>
                                        <select value={saleTypeId} onChange={e => setSaleTypeId(e.target.value)}
                                            className="w-full rounded-xl border-purple-200/60 border p-2.5 bg-white/60 backdrop-blur focus:bg-white focus:ring-2 focus:ring-purple-300 focus:border-purple-400 outline-none transition">
                                            {SALE_TYPES.map(t => (
                                                <option key={t.id} value={t.id}>{t.name}</option>
                                            ))}
                                        </select>
                                        <div className="text-xs text-slate-500 mt-1">
                                            % Премирования: {formatPercent(SALE_TYPES.find(t => t.id === saleTypeId)?.rate || 0)}
                                        </div>
                                    </div>
                                    <div className="col-span-2 md:col-span-1">
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Стоимость проекта (с НДС)</label>
                                        <div className="relative">
                                            <input type="text" inputMode="decimal"
                                                value={projectCost} onChange={e => setProjectCost(e.target.value)}
                                                placeholder="0.00"
                                                className="w-full rounded-xl border-purple-200/60 border p-2.5 pl-4 pr-8 bg-white/60 backdrop-blur focus:bg-white focus:ring-2 focus:ring-purple-300 focus:border-purple-400 outline-none" />
                                            <span className="absolute right-3 top-2.5 text-purple-400">₽</span>
                                        </div>
                                    </div>
                                    <div className="col-span-2 md:col-span-1">
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Затраты на лицензии</label>
                                        <div className="relative">
                                            <input type="text" inputMode="decimal"
                                                value={licenseCost} onChange={e => setLicenseCost(e.target.value)}
                                                placeholder="0.00"
                                                className="w-full rounded-xl border-purple-200/60 border p-2.5 pl-4 pr-8 bg-white/60 backdrop-blur focus:bg-white focus:ring-2 focus:ring-purple-300 focus:border-purple-400 outline-none" />
                                            <span className="absolute right-3 top-2.5 text-purple-400">₽</span>
                                        </div>
                                        <div className="text-xs text-slate-400 mt-1">Не облагаются НДС</div>
                                    </div>
                                    {(saleTypeId === 'license_tp' || saleTypeId === 'license_service') && (
                                        <div className="col-span-2 bg-gradient-to-r from-purple-50 via-pink-50 to-sky-50 p-4 rounded-2xl border border-purple-200/40">
                                            <label className="block text-sm font-bold text-purple-800 mb-1">
                                                Сумма, облагаемая НДС со стороны вендора
                                            </label>
                                            <div className="relative">
                                                <input type="text" inputMode="decimal"
                                                    value={vatableAmount} onChange={e => setVatableAmount(e.target.value)}
                                                    placeholder="0.00"
                                                    className="w-full rounded-xl border-purple-200/60 border p-2.5 pl-4 pr-8 bg-white/60 backdrop-blur focus:bg-white focus:ring-2 focus:ring-purple-300 focus:border-purple-400 outline-none" />
                                                <span className="absolute right-3 top-2.5 text-purple-400">₽</span>
                                            </div>
                                            <div className="text-xs text-purple-600 mt-1">
                                                В марже эта сумма вычитается полностью. НДС высчитывается только с этой суммы.
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="glass-card rounded-2xl shadow-xl shadow-purple-200/40 p-5">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-lg font-semibold flex items-center gap-2">
                                        <span className="material-symbols-outlined bg-gradient-to-br from-purple-500 via-pink-500 to-sky-400 bg-clip-text text-transparent">group</span>
                                        Участники сделки
                                    </h2>
                                    <button onClick={addEmployee}
                                        className="text-sm bg-gradient-to-r from-purple-50 to-pink-50 text-purple-600 px-3 py-1.5 rounded-xl hover:from-purple-100 hover:to-pink-100 transition-all font-medium flex items-center gap-1 border border-purple-200/40 shadow-sm">
                                        <span className="material-symbols-outlined text-sm">add</span> Добавить
                                    </button>
                                </div>
                                <div className="mb-4 bg-white/60 backdrop-blur rounded-full h-2.5 overflow-hidden shadow-inner">
                                    <div className={`h-full transition-all duration-500 ${totalShare > 1 ? 'bg-gradient-to-r from-red-400 to-pink-400' : 'bg-gradient-to-r from-green-400 via-emerald-400 to-teal-400'}`}
                                        style={{ width: `${Math.min(totalShare * 100, 100)}%` }}></div>
                                </div>
                                <div className="flex justify-between text-xs mb-4">
                                    <span className="text-slate-500">Распределено: {Math.round(totalShare * 100)}%</span>
                                    {!isShareValid && <span className="bg-gradient-to-r from-red-500 to-pink-500 bg-clip-text text-transparent font-bold">Сумма долей превышает 100%!</span>}
                                </div>
                                <div className="space-y-3">
                                    {employees.map(emp => (
                                        <div key={emp.id} className="flex items-center gap-3 bg-white/50 backdrop-blur p-3 rounded-xl border border-white/50 hover:border-purple-200/60 transition-all">
                                            <div className="flex-grow">
                                                <input type="text" value={emp.name}
                                                    onChange={e => updateEmployeeName(emp.id, e.target.value)}
                                                    placeholder="Имя сотрудника"
                                                    className="w-full bg-transparent border-b border-transparent focus:border-purple-300 outline-none text-sm font-medium" />
                                            </div>
                                            <div className="w-24 relative">
                                                <input type="number" min="0" max="100" step="5"
                                                    value={Math.round(emp.share * 100)}
                                                    onChange={e => updateEmployeeShare(emp.id, Number(e.target.value) / 100)}
                                                    className="w-full text-right pr-6 bg-white/80 border border-purple-200/40 rounded-xl px-2 py-1 text-sm focus:border-purple-400 outline-none backdrop-blur" />
                                                <span className="absolute right-2 top-1 text-purple-400 text-xs">%</span>
                                            </div>
                                            <button onClick={() => removeEmployee(emp.id)}
                                                className="text-slate-400 hover:text-red-400 transition" title="Удалить">
                                                <span className="material-symbols-outlined text-lg">delete</span>
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-5 space-y-6">
                            <div className="glass-card rounded-2xl shadow-xl shadow-purple-200/40 overflow-hidden">
                                <div className="bg-gradient-to-r from-purple-50 via-pink-50 to-sky-50 px-5 py-3 border-b border-white/50">
                                    <h3 className="font-semibold text-slate-700">Финансовая модель</h3>
                                </div>
                                <div className="p-5 space-y-3 text-sm">
                                    <div className="flex justify-between items-center py-1 border-b border-purple-100/50">
                                        <span className="text-slate-500">Стоимость без НДС</span>
                                        <span className="font-medium">{formatCurrency(calculation.costNoVat)}</span>
                                    </div>
                                    <div className="flex justify-between items-center py-1 border-b border-purple-100/50">
                                        <span className="text-slate-500">
                                            {(saleTypeId === 'license_tp' || saleTypeId === 'license_service')
                                                ? 'Маржа (Проект - Лиц. - Вендор)'
                                                : 'Маржа (Проект - Лицензии)'}
                                        </span>
                                        <span className={`font-medium ${calculation.displayMargin < 0 ? 'text-red-500' : ''}`}>
                                            {formatCurrency(calculation.displayMargin)}
                                        </span>
                                    </div>
                                    <div className="flex justify-between items-center py-1 border-b border-purple-100/50">
                                        <span className="text-slate-500">
                                            Налоговая нагрузка<br/>
                                            <span className="text-xs text-slate-400">(Налог {formatPercent(calculation.company.tax)} + 35%)</span>
                                        </span>
                                        <span className="text-slate-400">-{formatPercent(calculation.company.tax + 0.35)}</span>
                                    </div>
                                    <div className="flex justify-between items-center py-2 bg-gradient-to-r from-purple-50 via-pink-50 to-sky-50 px-2 rounded-xl -mx-2 border border-purple-200/30">
                                        <span className="font-medium bg-gradient-to-r from-purple-700 to-pink-600 bg-clip-text text-transparent">Чистая маржа</span>
                                        <span className={`font-bold text-lg ${calculation.netMargin < 0 ? 'text-red-500' : 'bg-gradient-to-r from-purple-700 to-pink-600 bg-clip-text text-transparent'}`}>
                                            {formatCurrency(calculation.netMargin)}
                                        </span>
                                    </div>
                                    {(saleTypeId === 'license_tp' || saleTypeId === 'license_service') && (
                                        <div className="text-xs text-slate-400 text-right mt-1">
                                            * Учтен частичный НДС ({formatCurrency(calculation.calculatedVatAmount)})
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="bg-gradient-to-br from-purple-600 via-pink-500 to-sky-400 rounded-2xl shadow-xl shadow-purple-300/50 text-white p-6">
                                <div className="mb-6">
                                    <div className="text-white/70 text-sm mb-1">
                                        {calculation.saleType.id === 'full_margin'
                                            ? 'К распределению (100% чистой маржи)'
                                            : `Премиальный ФОТ (${formatPercent(calculation.saleType.rate)})`}
                                    </div>
                                    <div className="text-3xl font-bold drop-shadow-lg">{formatCurrency(calculation.fot)}</div>
                                </div>
                                <div className="bg-white/10 rounded-2xl p-4 backdrop-blur-sm border border-white/10">
                                    <h4 className="font-semibold mb-3 text-white/80 border-b border-white/10 pb-2">Распределение премий</h4>
                                    {calculation.fot <= 0 ? (
                                        <div className="text-center text-white/50 py-2">Нет прибыли для распределения</div>
                                    ) : (
                                        <div className="space-y-2">
                                            {employees.map(emp => (
                                                <div key={emp.id} className="flex justify-between items-center text-sm">
                                                    <div className="flex items-center gap-2">
                                                        <span className="w-8 text-right text-white/50 text-xs">{Math.round(emp.share*100)}%</span>
                                                        <span className="truncate max-w-[120px]">{emp.name}</span>
                                                    </div>
                                                    <span className="font-mono font-bold text-white drop-shadow-sm">
                                                        {formatCurrency(calculation.fot * emp.share)}
                                                    </span>
                                                </div>
                                            ))}
                                            {!isShareValid && (
                                                <div className="mt-3 pt-2 border-t border-red-400/50 text-red-300 text-xs text-center">
                                                    Внимание: Сумма долей > 100%. Расчёт неверен.
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>

                    <footer className="mt-8 pt-4 border-t border-white/30 text-center text-xs text-slate-400">
                        <div className="mt-1">
                            Доступ разрешён для пользователей с ID: {ALLOWED_USER_IDS.join(', ')}
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
